kind = "video"
previewPath = "/play-demo/"
title = "Play App Demo Video"
version = "1.0.0"
id = "artifacts/play-demo"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/play-demo/" ]
localPort = 26154

[services.development]
run = "pnpm --filter @workspace/play-demo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/play-demo", "run", "build" ]
publicDir = "artifacts/play-demo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26154"
BASE_PATH = "/play-demo/"
