<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: linear-gradient(145deg, #0d0d14 0%, #1a0a1e 35%, #0a0d1a 70%, #000000 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    position: relative;
  }

  /* Background glow accents */
  body::before {
    content: '';
    position: absolute;
    top: 10%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(255,45,85,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: absolute;
    bottom: 15%;
    left: 50%;
    transform: translateX(-50%);
    width: 500px;
    height: 300px;
    background: radial-gradient(ellipse, rgba(91,141,238,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .tagline {
    font-size: 48px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -1px;
    text-align: center;
    margin-bottom: 10px;
    position: relative;
    z-index: 10;
  }
  .tagline span { color: #FF2D55; }

  .subtitle {
    font-size: 26px;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    text-align: center;
    margin-bottom: 70px;
    position: relative;
    z-index: 10;
  }

  /* ── iPhone 15 Pro frame ────────────────────────────── */
  .phone-wrap {
    position: relative;
    z-index: 10;
  }

  .phone {
    position: relative;
    width: 430px;
    height: 932px;
    border-radius: 55px;
    background: linear-gradient(160deg, #2c2c2e 0%, #1c1c1e 40%, #111113 100%);
    box-shadow:
      0 0 0 1.5px rgba(255,255,255,0.12),
      0 0 0 3px #0a0a0c,
      0 60px 120px rgba(0,0,0,0.9),
      0 20px 40px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Side buttons */
  .phone::before {
    content: '';
    position: absolute;
    left: -5px;
    top: 160px;
    width: 5px;
    height: 44px;
    background: linear-gradient(180deg, #3a3a3c, #2c2c2e);
    border-radius: 3px 0 0 3px;
    box-shadow: 0 60px 0 rgba(50,50,52,1), 0 -2px 0 #111;
  }
  .phone::after {
    content: '';
    position: absolute;
    right: -5px;
    top: 200px;
    width: 5px;
    height: 80px;
    background: linear-gradient(180deg, #3a3a3c, #2c2c2e);
    border-radius: 0 3px 3px 0;
  }

  .screen {
    width: 402px;
    height: 870px;
    border-radius: 47px;
    overflow: hidden;
    position: relative;
    background: #000;
  }

  .screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
  }

  /* Dynamic Island */
  .dynamic-island {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 34px;
    background: #000;
    border-radius: 20px;
    z-index: 20;
  }

  /* Home bar */
  .home-bar {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
    z-index: 20;
  }

  .features {
    display: flex;
    gap: 40px;
    margin-top: 60px;
    position: relative;
    z-index: 10;
  }

  .feat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .feat-icon {
    width: 52px;
    height: 52px;
    border-radius: 16px;
    background: rgba(255,45,85,0.15);
    border: 1px solid rgba(255,45,85,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  .feat-label {
    font-size: 18px;
    font-weight: 500;
    color: rgba(255,255,255,0.65);
  }

  .app-badge {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50px;
    padding: 12px 28px;
    z-index: 10;
  }

  .app-icon {
    width: 40px;
    height: 40px;
    background: #FF2D55;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .app-name {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
  }
  .app-version {
    font-size: 16px;
    color: rgba(255,255,255,0.4);
  }
</style>
</head>
<body>
  <p class="tagline">All your videos.<br><span>Beautifully organized.</span></p>
  <p class="subtitle">Local file player. No accounts. No ads.</p>

  <div class="phone-wrap">
    <div class="phone">
      <div class="screen">
        <img src="ss_home.jpg" alt="Home screen" />
        <div class="dynamic-island"></div>
        <div class="home-bar"></div>
      </div>
    </div>
  </div>

  <div class="features">
    <div class="feat">
      <div class="feat-icon">▶</div>
      <span class="feat-label">Native Playback</span>
    </div>
    <div class="feat">
      <div class="feat-icon">🔒</div>
      <span class="feat-label">Privacy First</span>
    </div>
    <div class="feat">
      <div class="feat-icon">⚡</div>
      <span class="feat-label">4K Hardware</span>
    </div>
    <div class="feat">
      <div class="feat-icon">🎯</div>
      <span class="feat-label">Smart Sort</span>
    </div>
  </div>

  <div class="app-badge">
    <div class="app-icon">▶</div>
    <div>
      <div class="app-name">Play</div>
      <div class="app-version">Video Player · v1.7.0</div>
    </div>
  </div>
</body>
</html>
